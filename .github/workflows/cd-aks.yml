name: CD to AKS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to build and deploy
        required: true
        default: v1

permissions:
  contents: read

env:
  IMAGE_NAME: ashiqabdulkhader/aceest-fitness
  RESOURCE_GROUP: rg-aceest-devops
  AKS_CLUSTER: aks-aceest-devops

jobs:
  build-test-scan-push-deploy:
    name: Build, test, scan, push, deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build pytest container stage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ci-test
          push: false
          tags: aceest:ci-test

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push amd64 runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
            docker.io/${{ env.IMAGE_NAME }}:latest

      - name: Azure login with service principal
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "$RESOURCE_GROUP" \
            --name "$AKS_CLUSTER" \
            --overwrite-existing

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/base/namespace.yaml
          kubectl wait --for=jsonpath='{.status.phase}'=Active namespace/aceest --timeout=60s
          kubectl apply -f k8s/base/secret.yaml
          kubectl apply -f k8s/base/deployment.yaml
          kubectl apply -f k8s/base/service.yaml
          kubectl -n aceest set image deployment/aceest-fitness \
            aceest-fitness=docker.io/${IMAGE_NAME}:${{ inputs.image_tag }}
          kubectl -n aceest rollout status deployment/aceest-fitness --timeout=240s

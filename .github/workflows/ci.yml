# Continuous integration: compile/lint, production Docker image, pytest in Docker.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    name: Build & lint (compile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Byte-compile (syntax errors fail the job)
        run: |
          python -m compileall -q aceest wsgi.py tests

  docker-image:
    name: Docker image (production)
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: false
          tags: aceest:ci-runtime
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-in-docker:
    name: Pytest in container (ci-test stage)
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ci-test stage (runs pytest during image build)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ci-test
          push: false
          tags: aceest:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

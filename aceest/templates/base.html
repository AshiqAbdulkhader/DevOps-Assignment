<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ACEest{% endblock %}</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --panel: #111;
      --text: #f0f0f0;
      --muted: #aaa;
      --accent: #d4af37;
      --input-bg: #333;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    a { color: var(--accent); }
    .header {
      background: var(--accent);
      color: #111;
      padding: 1rem 1.5rem;
      font-weight: 700;
      font-size: 1.25rem;
    }
    .wrap { max-width: 480px; margin: 2rem auto; padding: 0 1rem; }
    .card {
      background: var(--panel);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1.5rem;
    }
    label { display: block; margin-top: 1rem; color: var(--muted); font-size: 0.9rem; }
    input[type="text"], input[type="password"] {
      width: 100%;
      margin-top: 0.35rem;
      padding: 0.6rem 0.75rem;
      border: 1px solid #444;
      border-radius: 4px;
      background: var(--input-bg);
      color: var(--text);
    }
    button, .btn {
      display: inline-block;
      margin-top: 1.25rem;
      padding: 0.55rem 1.2rem;
      border: none;
      border-radius: 4px;
      background: var(--accent);
      color: #111;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    button:hover, .btn:hover { filter: brightness(1.05); }
    .error {
      margin-top: 1rem;
      padding: 0.65rem 0.75rem;
      background: #3d1515;
      border: 1px solid #822;
      border-radius: 4px;
      color: #fcc;
      font-size: 0.9rem;
    }
    .toolbar { margin-top: 1.5rem; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ACEest{% endblock %}</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --panel: #111;
      --text: #f0f0f0;
      --muted: #aaa;
      --accent: #d4af37;
      --input-bg: #333;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    a { color: var(--accent); }
    .header {
      background: var(--accent);
      color: #111;
      padding: 1rem 1.5rem;
      font-weight: 700;
      font-size: 1.25rem;
    }
    .wrap { max-width: 480px; margin: 2rem auto; padding: 0 1rem; }
    .wrap-wide { max-width: 920px; margin: 2rem auto; padding: 0 1rem; }
    .card {
      background: var(--panel);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1.5rem;
    }
    label { display: block; margin-top: 1rem; color: var(--muted); font-size: 0.9rem; }
    input[type="text"], input[type="password"] {
      width: 100%;
      margin-top: 0.35rem;
      padding: 0.6rem 0.75rem;
      border: 1px solid #444;
      border-radius: 4px;
      background: var(--input-bg);
      color: var(--text);
    }
    button, .btn {
      display: inline-block;
      margin-top: 1.25rem;
      padding: 0.55rem 1.2rem;
      border: none;
      border-radius: 4px;
      background: var(--accent);
      color: #111;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    button:hover, .btn:hover { filter: brightness(1.05); }
    .btn-compact { margin-top: 0; padding: 0.35rem 0.75rem; font-size: 0.85rem; }
    .error {
      margin-top: 1rem;
      padding: 0.65rem 0.75rem;
      background: #3d1515;
      border: 1px solid #822;
      border-radius: 4px;
      color: #fcc;
      font-size: 0.9rem;
    }
    .toolbar { margin-top: 1.5rem; }
    .flash-wrap { max-width: 920px; margin: 1rem auto 0; padding: 0 1rem; }
    .flash {
      padding: 0.65rem 0.85rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }
    .flash-success {
      background: #153d24;
      border: 1px solid #285;
      color: #cfe;
    }
    .flash-error {
      background: #3d1515;
      border: 1px solid #822;
      color: #fcc;
    }
    table.data {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.95rem;
    }
    table.data th, table.data td {
      text-align: left;
      padding: 0.5rem 0.65rem;
      border-bottom: 1px solid #333;
    }
    table.data th { color: var(--muted); font-weight: 600; }
    .header a { color: #111; text-decoration: none; }
    .header a:hover { text-decoration: underline; }
    .header-nav { font-size: 0.95rem; font-weight: 600; display: flex; gap: 1.25rem; flex-wrap: wrap; align-items: center; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="flash-wrap">
    {% for category, message in messages %}
    <div class="flash flash-{{ category }}" role="status">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}
  {% endwith %}
  {% block body %}{% endblock %}
</body>
</html>

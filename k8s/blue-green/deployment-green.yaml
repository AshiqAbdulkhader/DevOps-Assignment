apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
  namespace: aceest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      color: green
  template:
    metadata:
      labels:
        app: aceest-fitness
        color: green
        version: v2
    spec:
      containers:
        - name: aceest-fitness
          image: docker.io/ashiqabdulkhader/aceest-fitness:v2
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: aceest-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-a
  namespace: aceest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-ab
      variant: a
  template:
    metadata:
      labels:
        app: aceest-ab
        variant: a
        version: v1
    spec:
      containers:
        - name: aceest-fitness
          image: docker.io/ashiqabdulkhader/aceest-fitness:v1
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: aceest-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
